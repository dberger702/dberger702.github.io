<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="OnlyBands">
  <defs>
    <linearGradient id="obg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3d6e"/>
      <stop offset="0.55" stop-color="#fa2c56"/>
      <stop offset="1" stop-color="#7a1fa2"/>
    </linearGradient>
    <linearGradient id="obar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe6ee"/>
    </linearGradient>
    <radialGradient id="oglow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="26" fill="url(#obg)"/>
  <rect x="2" y="2" width="96" height="96" rx="26" fill="url(#oglow)"/>
  <!-- waveform equalizer -->
  <g fill="url(#obar)">
    <rect x="24" y="42" width="8.5" height="16" rx="4.25"/>
    <rect x="37" y="33" width="8.5" height="34" rx="4.25"/>
    <rect x="50" y="24" width="8.5" height="52" rx="4.25"/>
    <rect x="63" y="33" width="8.5" height="34" rx="4.25"/>
    <rect x="76" y="42" width="8.5" height="16" rx="4.25"/>
  </g>
</svg>
